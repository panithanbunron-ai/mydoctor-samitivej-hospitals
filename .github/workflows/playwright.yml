name: Playwright Tests
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        env:
            # UAT URLs are public knowledge (committed in .env.example); repo Variables can override them.
            TELEMEDICINE_URL: ${{ vars.TELEMEDICINE_URL || 'https://mydoctor-uat.samitivejhospitals.com/' }}
            BACKOFFICE_URL: ${{ vars.BACKOFFICE_URL || 'https://mydoctor-backoffice-uat.samitivejhospitals.com/' }}
            # Optional — credential-gated login/OTP cases skip cleanly when unset.
            BACKOFFICE_USERNAME: ${{ secrets.BACKOFFICE_USERNAME }}
            BACKOFFICE_PASSWORD: ${{ secrets.BACKOFFICE_PASSWORD }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
            - name: Install dependencies
              run: npm ci
            - name: Lint
              run: npm run lint
            - name: Typecheck
              run: npm run typecheck
            - name: Check formatting
              run: npm run format:check
            - name: Install Playwright Browsers
              # Only the browsers the two projects use (Desktop Chrome + iPhone/WebKit).
              run: npx playwright install --with-deps chromium webkit
            - name: Run Playwright tests
              run: npx playwright test
            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30
